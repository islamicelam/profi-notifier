services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: notifier-rabbitmq
    hostname: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: notifier-redis
    hostname: redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  producer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: producer
    image: notifier-platform/producer:latest
    container_name: notifier-producer
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      PRODUCER_PORT: 3000
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: consumer
    image: notifier-platform/consumer:latest
    container_name: notifier-consumer
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      CONSUMER_PORT: 3001
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      NOTIFIER_URL: http://notifier:3002
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notifier:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_NAME: notifier
    image: notifier-platform/notifier:latest
    container_name: notifier-notifier
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: production
      PORT: 3002
      NOTIFIER_PORT: 3002
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:
